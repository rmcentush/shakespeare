version: 2
updates:
  - package-ecosystem: npm
    directory: /Editor
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      tiptap:
        patterns:
          - "@tiptap/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /Service
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /Trainer
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /Service
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
