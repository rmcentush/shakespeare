name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and validate
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            Editor/package-lock.json
            Website/package-lock.json

      - name: Check source privacy
        run: make privacy-check

      - name: Install editor dependencies
        working-directory: Editor
        run: npm ci

      - name: Type-check editor
        working-directory: Editor
        run: npm run typecheck

      - name: Build editor assets
        working-directory: Editor
        run: npm run build

      - name: Install website dependencies
        working-directory: Website
        run: npm ci

      - name: Validate website
        working-directory: Website
        run: |
          npm run lint
          npm test

      - name: Copy editor assets into Swift resources
        run: |
          cp Editor/dist/editor.js Sources/WordProcessor/Resources/editor.js
          cp Editor/dist/editor.css Sources/WordProcessor/Resources/editor.css
          cp Editor/dist/harper-runtime.js Sources/WordProcessor/Resources/harper-runtime.js
          cp Editor/dist/harper-wasm-data.js Sources/WordProcessor/Resources/harper-wasm-data.js
          cp Editor/dist/THIRD_PARTY_NOTICES.txt Sources/WordProcessor/Resources/THIRD_PARTY_NOTICES.txt

      - name: Build macOS app
        run: swift build -c release -Xswiftc -warnings-as-errors

      - name: Package and verify app bundle
        env:
          APP_VERSION: 0.0.0
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          make package
          test -f .build/package/Shakespeare.app/Contents/Resources/WordProcessor_WordProcessor.bundle/editor.html
          test ! -e .build/package/Shakespeare.app/WordProcessor_WordProcessor.bundle
          test ! -e .build/package/Shakespeare.app/Contents/Resources/WordProcessor_WordProcessor.bundle/Fonts
          lipo .build/package/Shakespeare.app/Contents/MacOS/WordProcessor -verify_arch arm64 x86_64

      - name: Run regression evaluations
        run: make evals
