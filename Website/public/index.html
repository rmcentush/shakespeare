<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shakespeare for Mac</title>
    <meta name="description" content="A quiet writing app for macOS.">
    <meta name="theme-color" content="#8fb8c4">
    <link rel="canonical" href="https://writeshakespeare.com/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Shakespeare for Mac">
    <meta property="og:description" content="A quiet writing app for macOS.">
    <meta property="og:url" content="https://writeshakespeare.com/">
    <meta name="twitter:card" content="summary">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="scene">
      <h1 class="sr-only">Shakespeare for Mac</h1>

      <div class="window" aria-hidden="true">
        <div class="view">
          <div class="sky">
            <span class="sun"></span>
            <span class="cloud cloud-one"></span>
            <span class="cloud cloud-two"></span>
          </div>
          <div class="sea">
            <span class="sea-light"></span>
            <span class="wave wave-one"></span>
            <span class="wave wave-two"></span>
            <span class="wave wave-three"></span>
          </div>
        </div>
        <span class="mullion mullion-vertical"></span>
        <span class="mullion mullion-horizontal"></span>
        <span class="sill"></span>
      </div>

      <div class="desk" aria-hidden="true">
        <div class="paper"></div>
        <div class="pen">
          <span class="pen-band"></span>
          <span class="pen-nib"></span>
        </div>
      </div>

      <a class="download" href="/downloads/Shakespeare-latest.zip" download>
        <span>Download Shakespeare</span>
        <span aria-hidden="true">↓</span>
      </a>
    </main>
  </body>
</html>
