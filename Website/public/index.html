<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shakespeare for Mac</title>
    <meta name="description" content="Shakespeare is a local-first writing app for Mac that helps you write like yourself.">
    <meta name="theme-color" content="#8eaab3">
    <link rel="canonical" href="https://writeshakespeare.com/">
    <link rel="preload" href="/v3/sea-desk-hero.jpg" as="image" media="(orientation: landscape)" fetchpriority="high">
    <link rel="preload" href="/v3/sea-desk-hero-portrait.jpg" as="image" media="(orientation: portrait)" fetchpriority="high">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Shakespeare for Mac">
    <meta property="og:description" content="A local-first writing app for Mac that helps you write like yourself.">
    <meta property="og:url" content="https://writeshakespeare.com/">
    <meta property="og:image" content="https://writeshakespeare.com/v3/sea-desk-hero.jpg">
    <meta property="og:image:alt" content="A watercolor of an open wooden window above a writing desk overlooking the sea.">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="/v3/styles.css">
  </head>
  <body>
    <main class="scene">
      <div class="layout">
        <div class="message">
          <p class="brand">Shakespeare</p>
          <h1>Write like yourself.</h1>
          <p class="description">A local-first writing app for Mac.</p>
          <span class="download" data-release-action aria-disabled="true">
            <span>Release temporarily unavailable</span>
            <span aria-hidden="true">—</span>
          </span>
        </div>
        <picture class="scene-art">
          <source
            media="(orientation: portrait)"
            srcset="/v3/sea-desk-hero-portrait.jpg"
            width="1024"
            height="1536"
          >
          <img
            class="scene-image"
            src="/v3/sea-desk-hero.jpg"
            width="1536"
            height="1024"
            alt=""
            fetchpriority="high"
          >
        </picture>
      </div>
    </main>
  </body>
</html>
